version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ripple-postgres
    environment:
      POSTGRES_USER: ripple
      POSTGRES_PASSWORD: ripple
      POSTGRES_DB: ripple
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ripple"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ripple-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: ripple-api
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
      - ripple_memory:/app/.ripple

  streamlit:
    build:
      context: ../../apps/streamlit_demo
      dockerfile: Dockerfile
    container_name: ripple-streamlit
    ports:
      - "8501:8501"
    environment:
      RIPPLE_API_BASE: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  ripple_memory:
