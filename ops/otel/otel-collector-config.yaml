# OpenTelemetry Collector 配置
# 收集 Ripple 后端的 trace / metrics / logs

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 100
  
  # PII 脱敏(关键)
  attributes:
    actions:
      - key: api_key
        action: delete
      - key: prompt
        action: hash
      - key: user.email
        action: hash
      - key: phone_number
        action: delete

  # 资源标签
  resource:
    attributes:
      - key: service.name
        value: ripple-api
        action: insert
      - key: service.version
        value: "0.1.0"
        action: insert

exporters:
  # 调试输出
  logging:
    loglevel: info
  
  # Langfuse(LLM 专用 observability)
  otlphttp/langfuse:
    endpoint: https://cloud.langfuse.com/api/public/otel
    headers:
      Authorization: "Basic ${LANGFUSE_AUTH}"
  
  # Prometheus(metrics)
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes, resource]
      exporters: [logging, otlphttp/langfuse]
    
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus, logging]
    
    logs:
      receivers: [otlp]
      processors: [batch, attributes, resource]
      exporters: [logging]
