# Prometheus 配置 - 收集 Ripple metrics

global:
  scrape_interval: 15s
  external_labels:
    monitor: ripple-monitor

scrape_configs:
  - job_name: ripple-api
    static_configs:
      - targets: ['ripple-api:8000']
        labels:
          service: api
          env: production

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: otel

# 关键监控指标:
